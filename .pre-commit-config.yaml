repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all
        language: system
        pass_filenames: false

      - id: clippy
        name: clippy
        entry: cargo clippy -- -D warnings
        language: system
        pass_filenames: false

      - id: test
        name: cargo test
        entry: cargo test
        language: system
        pass_filenames: false
        stages: [pre-push]
