[package]
name = "molrs-python"
version = "0.0.6"
edition = "2024"
authors = ["MolCrafts"]
license = "BSD-3-Clause"
description = "Python bindings for molrs molecular simulation library"
repository = "https://github.com/MolCrafts/molrs"
homepage = "https://github.com/MolCrafts/molrs"

[lib]
name = "molrs_python"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.28", features = ["extension-module"] }
numpy = "0.28"
ndarray = "0.17"
molrs-ffi = { path = "../molrs-ffi", package = "molcrafts-molrs-ffi", version = "0.0.6" }
molrs = { path = "../molrs-core", package = "molcrafts-molrs", version = "0.0.6", default-features = false }
molrs-pack = { path = "../molrs-pack", package = "molcrafts-molrs-pack", version = "0.0.6", default-features = false }

[workspace]

[features]
default = []
f64 = ["molrs/f64", "molrs-pack/f64", "molrs-ffi/f64"]
i64 = ["molrs/i64", "molrs-pack/i64", "molrs-ffi/i64"]
u64 = ["molrs/u64", "molrs-pack/u64", "molrs-ffi/u64"]
