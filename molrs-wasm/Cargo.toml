[package]
name = "molrs"
version = "0.1.0"
edition = "2024"
authors = ["MolCrafts"]
description = "WASM bindings for molrs"
license = "BSD-3-Clause"
repository = "https://github.com/MolCrafts/molrs"

[lib]
crate-type = ["cdylib", "rlib"]
name = "molwasm"

[dependencies]
wasm-bindgen = "0.2.108"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }
molrs = { path = "../molrs-core", package = "molrs-core", features = ["zarr"], default-features = false }
molrs-ffi = { path = "../molrs-ffi" }
ndarray = "0.17"
zarrs = { version = "0.23", default-features = false }
console_error_panic_hook = "0.1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

