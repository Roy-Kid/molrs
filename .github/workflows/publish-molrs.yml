name: Publish molrs crates to crates.io

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci-rust.yml

  publish-core:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Dry run publish molrs-core
        run: cargo publish --manifest-path molrs-core/Cargo.toml --dry-run

      - name: Authenticate with crates.io (Trusted Publishing)
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish molrs-core to crates.io
        run: cargo publish --manifest-path molrs-core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

  publish-pack:
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io (Trusted Publishing)
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Wait for molrs-core release to reach the index
        run: sleep 30

      - name: Dry run publish molrs-pack
        run: cargo publish --manifest-path molrs-pack/Cargo.toml --dry-run

      - name: Publish molrs-pack to crates.io
        run: cargo publish --manifest-path molrs-pack/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
