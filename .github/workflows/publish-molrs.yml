name: Publish molrs crates to crates.io

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

# Dependency topology (must publish in this order):
#
#   molcrafts-molrs-core   (no molrs deps)
#     ├── molcrafts-molrs-io
#     ├── molcrafts-molrs-compute
#     ├── molcrafts-molrs-smiles
#     ├── molcrafts-molrs-ff
#     ├── molcrafts-molrs-embed
#     └── molrs-cxxapi             (also deps on -io)
#   molcrafts-molrs                (façade, deps on all of the above)
#
# Note: molcrafts-molpack lives in its own repo (MolCrafts/molpack) with its
# own publish pipeline.
#
# Each job publishes one crate, waits for the crates.io index to update,
# then the next job proceeds. A dry-run runs before every real publish.

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish-core:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --manifest-path molrs-core/Cargo.toml --dry-run
      - id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo publish --manifest-path molrs-core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-io:
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-io/Cargo.toml --dry-run
      - id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo publish --manifest-path molrs-io/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-compute:
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-compute/Cargo.toml --dry-run
      - id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo publish --manifest-path molrs-compute/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-smiles:
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-smiles/Cargo.toml --dry-run
      - id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo publish --manifest-path molrs-smiles/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-ff:
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-ff/Cargo.toml --dry-run
      - id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo publish --manifest-path molrs-ff/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-embed:
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-embed/Cargo.toml --dry-run
      - id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo publish --manifest-path molrs-embed/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-cxxapi:
    needs: publish-io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-cxxapi/Cargo.toml --dry-run
      - id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo publish --manifest-path molrs-cxxapi/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-facade:
    needs:
      - publish-io
      - publish-compute
      - publish-smiles
      - publish-ff
      - publish-embed
      - publish-cxxapi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs/Cargo.toml --dry-run
      - id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo publish --manifest-path molrs/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
