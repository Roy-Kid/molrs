name: Bench

# Runs the core criterion benchmarks (Frame, graph/topology, region,
# neighbors) and tracks them over time. Criterion's `--output-format bencher`
# emits the libtest `bench: N ns/iter` lines that github-action-benchmark's
# `cargo` tool parses.
#
# Like the cross-implementation suite, the full criterion run is too heavy /
# too noisy to gate every PR (PRs already get a `cargo bench --no-run` compile
# check in ci-rust.yml). It tracks perf on canonical pushes + on demand.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write      # push results to the gh-pages dashboard
  deployments: write   # github-action-benchmark uses deployment status

jobs:
  bench:
    name: core criterion
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run core benchmarks (bencher output)
        run: |
          cargo bench -p molcrafts-molrs --bench core_benchmarks -- \
            --output-format bencher | tee output.txt

      - name: Upload raw bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-bench-${{ github.run_id }}
          path: output.txt
          if-no-files-found: error

      - name: Publish benchmark history
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Criterion on shared runners is noisy — alert loudly, do not fail.
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
