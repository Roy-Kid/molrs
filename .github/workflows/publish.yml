name: Publish

on:
  push:
    tags:
      - "v*"
  # Manual re-trigger so a single failed publish job (e.g. trusted-publishing
  # auth glitch) can be retried without cutting a new tag.
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

# Repository guard: every job below is gated on
# `github.repository == 'MolCrafts/molrs'`. A fork that pushes a `v*`
# tag will see this workflow trigger but every job will be skipped, so
# nothing reaches crates.io / npm / PyPI from anywhere except the
# canonical MolCrafts/molrs repository.
#
# Defense in depth:
#   1. YAML-level repo guard (this file) — bulletproof, evaluated by
#      GitHub Actions server-side; cannot be bypassed by a fork.
#   2. Tag-reachable-from-master check (in `guard` job) — refuses to
#      publish a tag whose commit isn't on master, so a tag pushed
#      against an unmerged branch can't ship to a registry.
#   3. crates.io / npm / PyPI **trusted publishing** (OIDC) — every
#      registry mints a short-lived token whose JWT claims pin
#      iss / repository / workflow / environment. No long-lived
#      `CARGO_REGISTRY_TOKEN` / `NPM_TOKEN` / `PYPI_TOKEN` secret
#      lives in the repo, so a leaked secret cannot republish under
#      our names.
#   4. GitHub Environments (`release`, `pypi`) — required reviewers
#      and protected tag rules configured in repo settings give a
#      manual-approval gate before any registry call runs.
#
# Publish topology:
#
#                          ┌─ publish-core ─┬─ publish-io ──────┐
#                          │                ├─ publish-compute  │
#   ci ────────────────────┤                ├─ publish-ff       ├─ publish-facade
#      │                   │                └─ publish-conformer ───┘
#      ├─ publish-wasm
#      └─ build-python (matrix: linux, macos)  ─→  publish-python
#         (maturin build per-runner → trusted publishing via gh-action-pypi-publish)
#
# Notes:
#   - molrs-smiles was folded into molrs-io::smiles in v0.0.13; no longer
#     published as a standalone crate.
#   - molrs-cxxapi is a `staticlib` consumed by the Atomiverse C++ build via
#     CMake/corrosion (built from source), and molrs-capi is a `cdylib` linked
#     by C/C++ apps. Neither is consumed by Rust crates, so neither is
#     published to crates.io.
#   - Every publish step is idempotent: it queries the registry first and
#     skips if the current version is already published. So a partial run
#     can be safely re-driven via workflow_dispatch.

jobs:
  guard:
    name: repo-guard
    runs-on: ubuntu-latest
    if: github.repository == 'MolCrafts/molrs'
    steps:
      - name: Confirm canonical repository
        run: |
          echo "Publishing tag ${GITHUB_REF#refs/tags/} from ${GITHUB_REPOSITORY}"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is reachable from master
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          git fetch origin master
          TAG_SHA="${GITHUB_SHA}"
          MASTER_SHA="$(git rev-parse origin/master)"
          if ! git merge-base --is-ancestor "$TAG_SHA" "$MASTER_SHA"; then
            echo "::error::Tag ${GITHUB_REF#refs/tags/} (commit $TAG_SHA) is not an ancestor of master ($MASTER_SHA). Refusing to publish."
            echo "::error::Merge the release commit into master before pushing the tag."
            exit 1
          fi
          echo "Tag $TAG_SHA is reachable from master ($MASTER_SHA) — proceeding."

  ci:
    needs: guard
    if: github.repository == 'MolCrafts/molrs'
    uses: ./.github/workflows/ci.yml

  # ── Rust crates (crates.io trusted publishing, topological order) ───────────

  publish-core:
    needs: ci
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish molcrafts-molrs-core (skip if already on crates.io)
        run: bash scripts/publish-if-new.sh molrs-core/Cargo.toml molcrafts-molrs-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-io:
    needs: publish-core
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: sleep 30
      - name: Publish molcrafts-molrs-io (skip if already on crates.io)
        run: bash scripts/publish-if-new.sh molrs-io/Cargo.toml molcrafts-molrs-io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # molrs-signal is a leaf crate (only ndarray + rustfft), so it can publish in
  # parallel with publish-core. publish-compute depends on it.
  publish-signal:
    needs: ci
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish molcrafts-molrs-signal (skip if already on crates.io)
        run: bash scripts/publish-if-new.sh molrs-signal/Cargo.toml molcrafts-molrs-signal
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-compute:
    needs: [publish-core, publish-signal]
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: sleep 30
      - name: Publish molcrafts-molrs-compute (skip if already on crates.io)
        run: bash scripts/publish-if-new.sh molrs-compute/Cargo.toml molcrafts-molrs-compute
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-ff:
    needs: publish-core
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: sleep 30
      - name: Publish molcrafts-molrs-ff (skip if already on crates.io)
        run: bash scripts/publish-if-new.sh molrs-ff/Cargo.toml molcrafts-molrs-ff
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-conformer:
    needs: publish-core
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: sleep 30
      - name: Publish molcrafts-molrs-conformer (skip if already on crates.io)
        run: bash scripts/publish-if-new.sh molrs-conformer/Cargo.toml molcrafts-molrs-conformer
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-facade:
    needs:
      - publish-io
      - publish-compute
      - publish-ff
      - publish-conformer
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: sleep 30
      - name: Publish molcrafts-molrs (skip if already on crates.io)
        run: bash scripts/publish-if-new.sh molrs/Cargo.toml molcrafts-molrs
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ── WASM (npm trusted publishing) ────────────────────────────────────────────

  publish-wasm:
    needs: ci
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: cargo install wasm-pack
      - name: Build wasm package
        working-directory: molrs-wasm
        run: wasm-pack build --release --target bundler --scope molcrafts --out-name molrs
      - name: Publish to npm (trusted publishing + provenance, skip if already on registry)
        working-directory: molrs-wasm/pkg
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "✓ $NAME@$VERSION already on npm; skipping"
          else
            npm publish --access public --provenance
          fi

  # ── Python (PyPI trusted publishing via maturin) ────────────────────────────
  #
  # Two-stage layout:
  #   build-python  — matrix over (linux, macos), each runner produces its own
  #                   wheel into a per-runner artifact. Single Python (3.13).
  #   publish-python — downloads every artifact, hands the merged dist/ to
  #                   pypa/gh-action-pypi-publish via Trusted Publishing.
  #                   `skip-existing: true` makes a partial republish safe.

  build-python:
    needs: ci
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --release --out dist
          - os: macos-latest
            args: --release --out dist --target universal2-apple-darwin
          - os: windows-latest
            args: --release --out dist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: molrs-python
          manylinux: auto
          command: build
          args: ${{ matrix.args }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: molrs-python/dist

  publish-python:
    needs: build-python
    if: github.repository == 'MolCrafts/molrs'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
