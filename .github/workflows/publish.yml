name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

# Publish topology:
#
#                          ┌─ publish-core ─┬─ publish-io ─┬─ publish-cxxapi ─┐
#                          │                ├─ publish-compute                 │
#   ci ────────────────────┤                ├─ publish-smiles                  ├─ publish-facade
#      │                   │                ├─ publish-ff                      │
#      │                   │                └─ publish-embed ──────────────────┘
#      ├─ publish-wasm
#      └─ publish-python  (maturin publish, manylinux, trusted publishing)

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Rust crates (crates.io, topological order) ──────────────────────────────

  publish-core:
    needs: ci
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --manifest-path molrs-core/Cargo.toml --dry-run
      - run: cargo publish --manifest-path molrs-core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-io:
    needs: publish-core
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-io/Cargo.toml --dry-run
      - run: cargo publish --manifest-path molrs-io/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-compute:
    needs: publish-core
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-compute/Cargo.toml --dry-run
      - run: cargo publish --manifest-path molrs-compute/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-smiles:
    needs: publish-core
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-smiles/Cargo.toml --dry-run
      - run: cargo publish --manifest-path molrs-smiles/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-ff:
    needs: publish-core
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-ff/Cargo.toml --dry-run
      - run: cargo publish --manifest-path molrs-ff/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-embed:
    needs: publish-core
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-embed/Cargo.toml --dry-run
      - run: cargo publish --manifest-path molrs-embed/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-cxxapi:
    needs: publish-io
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs-cxxapi/Cargo.toml --dry-run
      - run: cargo publish --manifest-path molrs-cxxapi/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-facade:
    needs:
      - publish-io
      - publish-compute
      - publish-smiles
      - publish-ff
      - publish-embed
      - publish-cxxapi
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish --manifest-path molrs/Cargo.toml --dry-run
      - run: cargo publish --manifest-path molrs/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── WASM (npm) ───────────────────────────────────────────────────────────────

  publish-wasm:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: cargo install wasm-pack
      - name: Build wasm package
        working-directory: molrs-wasm
        run: wasm-pack build --release --target bundler --scope molcrafts --out-name molrs
      - name: Publish to npm
        working-directory: molrs-wasm/pkg
        run: npm publish --access public --provenance

  # ── Python (PyPI, maturin trusted publishing) ───────────────────────────────

  publish-python:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: publish
          working-directory: molrs-python
          args: --no-sdist --find-interpreter
          manylinux: auto
