name: CI Rust

on:
  workflow_call:
  workflow_dispatch:

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: |
          cargo clippy --workspace --all-targets -- -D warnings
          cargo clippy -p molcrafts-molrs --all-targets --features full -- -D warnings

  test:
    name: test
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: molrs-core/target/tests-data
          key: ${{ runner.os }}-test-data-${{ hashFiles('scripts/fetch-test-data.sh') }}
          restore-keys: |
            ${{ runner.os }}-test-data-

      - name: Fetch test data
        run: bash scripts/fetch-test-data.sh

      - name: Test (workspace)
        run: cargo test --workspace --lib --tests --examples

      - name: Test (façade with all sub-systems)
        run: cargo test -p molcrafts-molrs --lib --tests --features "full filesystem"

      - name: Benches build (core)
        run: cargo bench -p molcrafts-molrs-core --no-run
