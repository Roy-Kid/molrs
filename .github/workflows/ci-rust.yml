name: CI Rust

on:
  workflow_call:
  workflow_dispatch:

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: |
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo clippy -p molcrafts-molrs --all-targets --features full --locked -- -D warnings

  test:
    name: test
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: tests-data
          key: ${{ runner.os }}-test-data-${{ hashFiles('scripts/fetch-test-data.sh') }}
          restore-keys: |
            ${{ runner.os }}-test-data-

      - name: Fetch test data
        run: bash scripts/fetch-test-data.sh

      - name: Test (workspace)
        run: cargo test --workspace --lib --tests --examples --locked

      - name: Test (all sub-systems)
        run: cargo test -p molcrafts-molrs --lib --tests --examples --features "full filesystem" --locked

      - name: Benches build
        run: cargo bench -p molcrafts-molrs --no-run --features full
