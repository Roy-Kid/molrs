name: CI/CD Pipeline

on:
  push:
    branches: [ dev, master ]
    tags: 'v*'
  pull_request:
    branches: [ dev, master ]
  workflow_dispatch:

jobs:

  test-molrs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: target/tests-data
          key: ${{ runner.os }}-test-data-${{ hashFiles('scripts/fetch-test-data.sh') }}
          restore-keys: |
            ${{ runner.os }}-test-data-

      - name: Fetch test data
        run: bash scripts/fetch-test-data.sh

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Test molrs
        run: cargo test --all-features

  test-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: target/tests-data
          key: ${{ runner.os }}-test-data-${{ hashFiles('scripts/fetch-test-data.sh') }}
          restore-keys: |
            ${{ runner.os }}-test-data-

      - name: Fetch test data
        run: bash scripts/fetch-test-data.sh

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Test wasm
        working-directory: molrs-wasm
        run: wasm-pack test --chrome


  formatting:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rustfmt Check
        run: cargo fmt --check